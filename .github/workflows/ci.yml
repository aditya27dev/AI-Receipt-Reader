name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test --run

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_VERCEL_MODE: "true"
          BETTER_AUTH_SECRET: "ci-placeholder-secret-minimum-32-chars"
          DEV_ORIGIN: "http://localhost:3000"
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
